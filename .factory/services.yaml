commands:
  install: cargo build --release
  build: cargo build --release
  test: cargo test
  test-features: cargo test --no-default-features --features hermes && cargo test --features hermes,codex-hook && cargo test --features hermes,claude-hook && cargo test
  typecheck: cargo clippy -- -D warnings
  lint: cargo fmt --check

services:
  hermip:
    start: hermip daemon start --config hermip.toml
    stop: hermip daemon stop
    healthcheck: curl -sf http://localhost:25294/health
    port: 25294
    depends_on: []
